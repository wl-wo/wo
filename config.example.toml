[compositor]
socket_name = "wo-0"
ipc_socket = "$XDG_RUNTIME_DIR/wo-ipc.sock"
electron_path = "electron"
background = [0.08, 0.10, 0.12, 1.0]
enable_portal = true
portal_socket = "$XDG_RUNTIME_DIR/wo-portal.sock"
enable_syscalls = true
focus_notify = true

# Environment variables passed to all spawned child processes.
# DISPLAY defaults to ":0" so X11 apps (e.g. Steam) work even before
# XWayland is ready.  XWayland overrides DISPLAY with the actual value.
[compositor.environment]
DISPLAY = ":0"

[[root]]
name = "main"
url = "http://localhost:5173"
fps = 60
focusable = false
interactive = false

[[autostart]]
name = "init-portal"
command = "wo://portal/start"
delay = 100

[[autostart]]
name = "vite"
command = "cd /